<!DOCTYPE html>
<html>
  <head>
    <title>Books Catalog</title>
  </head>
  <body>
    <h1>Books List</h1>
    <ul id="bookList"></ul>

    <script>
      fetch('/api/books')
        .then(res => res.json())
        .then(data => {
          let list = document.getElementById('bookList')

          data.forEach(book => {
            let li = document.createElement('li')
            li.textContent = book.title + ' by ' + book.author
            list.appendChild(li)
          })
        })
    </script>
  </body>
</html>
